<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Wishlist - Ecommerce Website</title>

  <style>
    /* ======== WISHLIST PAGE ======== */
    .wishlist__section {
      padding-block: 3rem 5rem;
    }

    /* Empty state */
    .wishlist__empty {
      text-align: center;
      padding-block: 5rem;
      display: none;
    }

    .wishlist__empty.show-empty {
      display: block;
    }

    .wishlist__empty-icon {
      font-size: 4rem;
      color: var(--border-color-alt);
      margin-bottom: 1.5rem;
      display: block;
    }

    .wishlist__empty-title {
      font-size: var(--h4-font-size);
      margin-bottom: 0.75rem;
    }

    .wishlist__empty-text {
      color: var(--text-color-light);
      font-size: var(--small-font-size);
      margin-bottom: 2rem;
    }

    /* Grid */
    .wishlist__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .wishlist__grid.show-empty {
      display: none;
    }

    /* Card */
    .wishlist__card {
      border: 1px solid var(--border-color-alt);
      border-radius: 1rem;
      overflow: hidden;
      background: var(--body-color);
      transition: box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }

    .wishlist__card:hover {
      box-shadow: 0 8px 32px hsla(0, 0%, 0%, 0.08);
    }

    /* Image */
    .wishlist__img-wrapper {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--container-color);
    }

    .wishlist__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .wishlist__card:hover .wishlist__img {
      transform: scale(1.05);
    }

    /* Remove button */
    .wishlist__remove {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--body-color);
      color: hsl(0, 80%, 60%);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px hsla(0, 0%, 0%, 0.12);
      transition: all 0.2s;
    }

    .wishlist__remove:hover {
      background: hsl(0, 80%, 60%);
      color: #fff;
    }

    /* Card body */
    .wishlist__body {
      padding: 1rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .wishlist__category {
      font-size: var(--tiny-font-size);
      color: var(--text-color-light);
    }

    .wishlist__name {
      font-family: var(--second-font);
      font-size: var(--small-font-size);
      font-weight: var(--weight-600);
      color: var(--title-color);
      line-height: 1.4;
    }

    .wishlist__price {
      color: var(--first-color);
      font-family: var(--second-font);
      font-weight: var(--weight-700);
      font-size: var(--normal-font-size);
    }

    /* Add to Cart btn */
    .wishlist__add-btn {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      height: 42px;
      background-color: var(--first-color);
      border: 2px solid var(--first-color);
      color: var(--body-color);
      border-radius: 0.5rem;
      font-family: var(--second-font);
      font-size: var(--small-font-size);
      font-weight: var(--weight-700);
      cursor: pointer;
      transition: all 0.3s;
    }

    .wishlist__add-btn:hover {
      background-color: transparent;
      color: var(--first-color);
    }

    /* Toolbar */
    .wishlist__toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .wishlist__count {
      font-size: var(--small-font-size);
      color: var(--text-color-light);
    }

    .wishlist__count span {
      font-weight: var(--weight-700);
      color: var(--title-color);
    }

    .wishlist__clear-btn {
      background: none;
      border: 1px solid var(--border-color-alt);
      border-radius: 0.375rem;
      padding: 0.5rem 1rem;
      font-size: var(--small-font-size);
      font-weight: var(--weight-600);
      font-family: var(--second-font);
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.2s;
    }

    .wishlist__clear-btn:hover {
      border-color: hsl(0, 80%, 60%);
      color: hsl(0, 80%, 60%);
      background-color: hsl(0, 80%, 97%);
    }

    /* Toast */
    .wish__toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background-color: var(--first-color);
      color: var(--body-color);
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: var(--small-font-size);
      font-weight: var(--weight-600);
      box-shadow: 0 4px 20px hsla(176, 88%, 27%, 0.35);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
    }

    .wish__toast.show-toast {
      transform: translateY(0);
      opacity: 1;
    }

    /* Centered nav (matches carts.html) */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      column-gap: 1rem;
      height: var(--header-height, 64px);
      padding-block: 0.5rem;
    }

    .nav__menu {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .nav__list {
      display: flex;
      align-items: center;
      column-gap: 2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>

  <!--=============== HEADER ===============-->
  <header class="header">
    <div class="header__top">
      <div class="header__container container">
        <div class="header__contact">
          <span>(+373) - 6874 - 6543</span>
          <span>Our location</span>
        </div>
        <p class="header__alert-news">Super Value Deals - Save more with coupons</p>
        <a href="login-register.html" class="header__top-action">Log In / Sign Up</a>
      </div>
    </div>

    <nav class="nav container">
      <a href="index.html" class="nav__logo">
        <img src="img/logo.svg" alt="" class="nav__logo-img">
      </a>
      <div class="nav__menu" id="nav-menu">
        <ul class="nav__list">
          <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
          <li class="nav__item"><a href="shop.html" class="nav__link">Shop</a></li>
          <li class="nav__item"><a href="wishlist.html" class="nav__link active-link">Wishlist</a></li>
          <li class="nav__item"><a href="carts.html" class="nav__link">Carts</a></li>
          <li class="nav__item"><a href="login-register.html" class="nav__link">Login</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!--=============== MAIN ===============-->
  <main class="main">
    <section class="wishlist__section section container">

      <h2 class="section__title">My Wishlist</h2>

      <!-- Toolbar -->
      <div class="wishlist__toolbar" id="wishlist-toolbar" style="display:none;">
        <p class="wishlist__count"><span id="wl-item-count">0</span> items saved</p>
        <button class="wishlist__clear-btn" id="wl-clear-btn" type="button">
          <i class="fi fi-rr-trash"></i> Clear Wishlist
        </button>
      </div>

      <!-- Empty state -->
      <div class="wishlist__empty show-empty" id="wl-empty">
        <i class="fi fi-rr-heart wishlist__empty-icon"></i>
        <h3 class="wishlist__empty-title">Your wishlist is empty</h3>
        <p class="wishlist__empty-text">Browse our shop and click the ❤ icon to save your favourites.</p>
        <a href="shop.html" class="btn">Start Shopping</a>
      </div>

      <!-- Product grid -->
      <div class="wishlist__grid show-empty" id="wl-grid">
        <!-- cards injected by JS -->
      </div>

    </section>


  </main>

  <!--=============== FOOTER ===============-->
  <footer class="footer"></footer>

  <!-- Toast -->
  <div class="wish__toast" id="wish-toast">
    <i class="fi fi-rr-check-circle"></i>
    <span id="wish-toast-msg">Done!</span>
  </div>

  <!--=============== SWIPER JS ===============-->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

  <!--=============== MAIN JS ===============-->
  <script src="js/main.js"></script>

  <!--=============== WISHLIST + CART JS ===============-->
  <script>
    /* =========================================================
       KEYS
    ========================================================= */
    const WL_KEY = 'wishlist';
    const CART_KEY = 'cart';

    /* =========================================================
       HELPERS
    ========================================================= */
    function getWishlist() {
      try { return JSON.parse(localStorage.getItem(WL_KEY)) || []; } catch { return []; }
    }
    function saveWishlist(list) {
      localStorage.setItem(WL_KEY, JSON.stringify(list));
    }
    function getCart() {
      try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch { return []; }
    }
    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    /* =========================================================
       TOAST
    ========================================================= */
    function wishlistToast(msg) {
      const toast = document.getElementById('wish-toast');
      document.getElementById('wish-toast-msg').textContent = msg;
      toast.classList.add('show-toast');
      setTimeout(() => toast.classList.remove('show-toast'), 3000);
    }

    /* =========================================================
       ADD TO CART (from wishlist)
    ========================================================= */
    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find(i => i.id === product.id);
      if (existing) { existing.qty += 1; } else { cart.push({ ...product, qty: 1 }); }
      saveCart(cart);
      wishlistToast(`"${product.name}" added to cart!`);
      setTimeout(() => { window.location.href = 'carts.html'; }, 1200);
    }

    /* =========================================================
       REMOVE FROM WISHLIST
    ========================================================= */
    function removeFromWishlist(id) {
      let list = getWishlist().filter(i => i.id !== id);
      saveWishlist(list);
      renderWishlist();
      wishlistToast('Removed from wishlist.');
    }

    /* =========================================================
       RENDER
    ========================================================= */
    /* Map of id → image URL so we avoid embedding URLs in HTML attributes */
    let _imageMap = {};

    function renderWishlist() {
      const list = getWishlist();
      const grid = document.getElementById('wl-grid');
      const empty = document.getElementById('wl-empty');
      const toolbar = document.getElementById('wishlist-toolbar');
      const count = document.getElementById('wl-item-count');

      /* ---- show / hide ---- */
      if (list.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        toolbar.style.display = 'none';
        return;
      }

      grid.classList.remove('show-empty');
      grid.style.display = 'grid';
      empty.classList.remove('show-empty');
      empty.style.display = 'none';
      toolbar.style.display = 'flex';
      count.textContent = list.length;

      /* Build image map to avoid URL injection inside HTML attributes */
      _imageMap = {};
      list.forEach(item => { _imageMap[item.id] = item.image; });

      grid.innerHTML = list.map(item => `
        <div class="wishlist__card" data-id="${item.id}">
          <div class="wishlist__img-wrapper">
            <img src="${item.image}" alt="" class="wishlist__img"
                 onerror="this.style.background='var(--container-color)';this.src=''">
            <button class="wishlist__remove wl-remove-btn" data-id="${item.id}" type="button" aria-label="Remove from wishlist">
              <i class="fi fi-rr-cross-small"></i>
            </button>
          </div>
          <div class="wishlist__body">
            <span class="wishlist__category">${item.category || ''}</span>
            <span class="wishlist__name">${item.name || ''}</span>
            <span class="wishlist__price">$${Number(item.price || 0).toFixed(2)}</span>
            <button class="wishlist__add-btn wl-add-cart-btn" type="button"
                    data-id="${item.id}"
                    data-name="${encodeURIComponent(item.name || '')}"
                    data-category="${encodeURIComponent(item.category || '')}"
                    data-price="${item.price || 0}">
              <i class="fi fi-rr-shopping-bag-add"></i> Add to Cart
            </button>
          </div>
        </div>
      `).join('');

      /* Attach events */
      document.querySelectorAll('.wl-remove-btn').forEach(btn => {
        btn.addEventListener('click', () => removeFromWishlist(btn.dataset.id));
      });

      document.querySelectorAll('.wl-add-cart-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          addToCart({
            id: id,
            name: decodeURIComponent(btn.dataset.name),
            category: decodeURIComponent(btn.dataset.category),
            price: parseFloat(btn.dataset.price),
            image: _imageMap[id] || ''
          });
        });
      });
    }

    /* =========================================================
       CLEAR WISHLIST
    ========================================================= */
    document.getElementById('wl-clear-btn').addEventListener('click', () => {
      if (!confirm('Clear entire wishlist?')) return;
      saveWishlist([]);
      renderWishlist();
      wishlistToast('Wishlist cleared.');
    });

    /* =========================================================
       INIT
    ========================================================= */
    renderWishlist();

    /* =========================================================
       DYNAMIC PRODUCTS LOAD (JSON)
    ========================================================= */
    async function loadProducts() {
      try {
        const res = await fetch('./products.json');
        if (!res.ok) throw new Error('File not found');
        const products = await res.json();

        const grid = document.getElementById('all-products-grid');
        if (!grid) return;

        grid.innerHTML = products.map(item => `
          <div style="border: 1px solid var(--border-color-alt); border-radius: 1rem; overflow: hidden; background: var(--body-color); display: flex; flex-direction: column;">
            <div style="position: relative; aspect-ratio: 1; overflow: hidden; background: var(--container-color);">
              <img src="${item.image}" alt="" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='', this.style.background='var(--container-color)'">
            </div>
            <div style="padding: 1rem 1.25rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
              <span style="font-size: var(--tiny-font-size); color: var(--text-color-light);">${item.category || ''}</span>
              <span style="font-family: var(--second-font); font-size: var(--small-font-size); font-weight: var(--weight-600); color: var(--title-color);">${item.name || ''}</span>
              <span style="color: var(--first-color); font-family: var(--second-font); font-weight: var(--weight-700); font-size: var(--normal-font-size);">$${Number(item.price || 0).toFixed(2)}</span>
              <button class="add-to-wl-from-json" 
                      data-id="${item.id}"
                      data-name="${encodeURIComponent(item.name || '')}"
                      data-category="${encodeURIComponent(item.category || '')}"
                      data-price="${item.price || 0}"
                      data-image="${item.image || ''}"
                      style="margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; height: 42px; background-color: var(--body-color); border: 2px solid var(--first-color); color: var(--title-color); border-radius: 0.5rem; font-family: var(--second-font); font-size: var(--small-font-size); font-weight: var(--weight-700); cursor: pointer;">
                <i class="fi fi-rr-heart"></i> Add to Wishlist
              </button>
            </div>
          </div>
        `).join('');

        // Attach event listeners
        document.querySelectorAll('.add-to-wl-from-json').forEach(btn => {
          btn.addEventListener('click', () => {
            const product = {
              id: btn.dataset.id,
              name: decodeURIComponent(btn.dataset.name),
              category: decodeURIComponent(btn.dataset.category),
              price: parseFloat(btn.dataset.price),
              image: btn.dataset.image
            };
            let list = getWishlist();
            if (!list.find(i => i.id === product.id)) {
              list.push(product);
              saveWishlist(list);
              renderWishlist();
              wishlistToast('Added to wishlist UI!');
            } else {
              wishlistToast('Already in wishlist!');
            }
          });
        });
      } catch (err) {
        console.error('Failed to load products:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>
</body>

</html>
